// Color scheme
const COLORS = {
  domain:        { bg: '#f0883e', border: '#f0883e', font: '#000' },
  meta:          { bg: '#238636', border: '#7ee787', font: '#fff' },
  language_core: { bg: '#1f6feb', border: '#58a6ff', font: '#fff' },
  love_core:     { bg: '#bf3989', border: '#f778ba', font: '#fff' },
  money_core:    { bg: '#8957e5', border: '#d2a8ff', font: '#fff' },
  theory:        { bg: '#9e6a03', border: '#ffd700', font: '#fff' },
  cluster:       { bg: '#196c2e', border: '#39d353', font: '#fff' },
};

function getColor(node) {
  if (node.type === 'Domain') return COLORS.domain;
  if (node.type === 'Theory') return COLORS.theory;
  if (node.type === 'Cluster') return COLORS.cluster;
  return COLORS[node.category] || COLORS.meta;
}

function getSize(node) {
  if (node.type === 'Domain') return 32;
  if (node.type === 'Cluster') return 22;
  if (node.type === 'Theory') return 18;
  return 14;
}

// Build node/edge index
const nodeMap = {};
GRAPH.nodes.forEach(n => { nodeMap[n.id] = n; });

// Build adjacency
const adj = {};  // key → [{edge, neighbor}]
GRAPH.edges.forEach(e => {
  if (!adj[e.source]) adj[e.source] = [];
  if (!adj[e.target]) adj[e.target] = [];
  adj[e.source].push({ edge: e, neighbor: e.target, dir: '→' });
  adj[e.target].push({ edge: e, neighbor: e.source, dir: '←' });
});

// vis.js data
const visNodes = new vis.DataSet(GRAPH.nodes.map(n => {
  const c = getColor(n);
  return {
    id: n.id,
    label: n.label,
    size: getSize(n),
    color: { background: c.bg, border: c.border, highlight: { background: c.border, border: '#fff' } },
    font: { color: c.font, size: n.type === 'Domain' ? 16 : 12, face: 'PingFang SC, Microsoft YaHei, sans-serif' },
    shape: n.type === 'Domain' ? 'diamond' : n.type === 'Theory' ? 'triangle' : n.type === 'Cluster' ? 'hexagon' : 'dot',
    borderWidth: 2,
    _data: n,
  };
}));

const EDGE_COLORS = {
  RELATES_TO: 'rgba(139,148,158,0.45)',
  SHARES_STRUCTURE_WITH: 'rgba(240,136,62,0.6)',
  EMPHASIZES: 'rgba(255,215,0,0.5)',
  HAS_CONCEPT: 'rgba(63,185,80,0.35)',
  BELONGS_TO: 'rgba(63,185,80,0.35)',
  PART_OF: 'rgba(88,166,255,0.35)',
  HAS_CLUSTER: 'rgba(88,166,255,0.35)',
};
const EDGE_DASHES = {
  RELATES_TO: false,
  SHARES_STRUCTURE_WITH: [8, 4],
  EMPHASIZES: [2, 4],
  HAS_CONCEPT: [4, 2],
  BELONGS_TO: [4, 2],
  PART_OF: false,
  HAS_CLUSTER: false,
};

const visEdges = new vis.DataSet(GRAPH.edges.map((e, i) => ({
  id: i,
  from: e.source,
  to: e.target,
  color: { color: EDGE_COLORS[e.rel] || '#8b949e', opacity: 0.6, highlight: '#58a6ff' },
  dashes: EDGE_DASHES[e.rel] || false,
  width: Math.max(1, (e.weight || 0.5) * 2.5),
  arrows: { to: { enabled: true, scaleFactor: 0.5 } },
  smooth: { type: 'continuous', roundness: 0.2 },
  _data: e,
})));

// Network
const container = document.getElementById('graph');
const network = new vis.Network(container, { nodes: visNodes, edges: visEdges }, {
  physics: {
    solver: 'forceAtlas2Based',
    forceAtlas2Based: { gravitationalConstant: -60, centralGravity: 0.008, springLength: 140, springConstant: 0.04, damping: 0.4 },
    stabilization: { iterations: 200 },
  },
  interaction: { hover: true, tooltipDelay: 100, zoomView: true, dragView: true },
  layout: { improvedLayout: true },
});

// Click → show panel
const panel = document.getElementById('panel');

network.on('click', function(params) {
  if (params.nodes.length === 0) {
    panel.classList.remove('open');
    return;
  }
  const id = params.nodes[0];
  const node = nodeMap[id];
  if (!node) return;
  showPanel(node);
});

function showPanel(node) {
  document.getElementById('p-name').textContent = node.label;

  const c = getColor(node);
  document.getElementById('p-name').style.color = c.border;

  // Subtitle
  const parts = [];
  if (node.type) parts.push(node.type);
  if (node.category && node.category !== node.type.toLowerCase()) parts.push(node.category);
  document.getElementById('p-subtitle').textContent = parts.join(' · ') + ' · ' + node.id;

  // Description
  document.getElementById('p-desc').textContent = node.description || '';

  // Domains
  const domEl = document.getElementById('p-domains');
  if (node.domains && node.domains.length) {
    const domColors = { language: '#58a6ff', love: '#f778ba', money: '#d2a8ff' };
    const domNames = { language: '语言', love: '爱情', money: '货币' };
    domEl.innerHTML = '<div class="section-title">所属领域</div>' +
      node.domains.map(d =>
        `<span class="tag" style="background:${domColors[d]}22;color:${domColors[d]};border:1px solid ${domColors[d]}44">${domNames[d] || d}</span>`
      ).join('');
  } else {
    domEl.innerHTML = '';
  }

  // Relations
  const relEl = document.getElementById('p-relations');
  const neighbors = adj[node.id] || [];
  if (neighbors.length) {
    const relColors = {
      RELATES_TO: '#8b949e',
      SHARES_STRUCTURE_WITH: '#f0883e',
      EMPHASIZES: '#ffd700',
      HAS_CONCEPT: '#3fb950',
      BELONGS_TO: '#3fb950',
      PART_OF: '#58a6ff',
      HAS_CLUSTER: '#58a6ff',
    };
    relEl.innerHTML = '<div class="section-title">关系 (' + neighbors.length + ')</div>' +
      neighbors.map(n => {
        const nb = nodeMap[n.neighbor];
        const nbColor = nb ? getColor(nb).border : '#8b949e';
        const relColor = relColors[n.edge.rel] || '#8b949e';
        return `<div class="rel-item" onclick="navigateTo('${n.neighbor}')">
          <span class="rel-arrow">${n.dir}</span>
          <span class="rel-name" style="color:${nbColor}">${nb ? nb.label : n.neighbor}</span>
          <span class="rel-type" style="color:${relColor}">${n.edge.subType || n.edge.rel}</span>
          ${n.edge.note ? `<div class="rel-note">${n.edge.note}</div>` : ''}
        </div>`;
      }).join('');
  } else {
    relEl.innerHTML = '<div class="section-title">关系</div><div style="color:#8b949e;font-size:13px">无直接关系</div>';
  }

  panel.classList.add('open');
}

function navigateTo(nodeId) {
  network.selectNodes([nodeId]);
  network.focus(nodeId, { scale: 1.2, animation: { duration: 500, easingFunction: 'easeInOutQuad' } });
  const node = nodeMap[nodeId];
  if (node) showPanel(node);
}

document.getElementById('panel-close').onclick = () => panel.classList.remove('open');

// Filters
let currentFilter = 'all';
document.querySelectorAll('#filters button').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('#filters button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    applyFilter(currentFilter);
  };
});

function applyFilter(filter) {
  if (filter === 'all') {
    visNodes.forEach(n => visNodes.update({ id: n.id, hidden: false }));
    visEdges.forEach(e => visEdges.update({ id: e.id, hidden: false }));
    return;
  }

  if (filter === 'cross') {
    const crossNodeIds = new Set();
    visEdges.forEach(e => {
      const isCross = e._data.rel === 'SHARES_STRUCTURE_WITH';
      visEdges.update({ id: e.id, hidden: !isCross });
      if (isCross) { crossNodeIds.add(e.from); crossNodeIds.add(e.to); }
    });
    visNodes.forEach(n => visNodes.update({ id: n.id, hidden: !crossNodeIds.has(n.id) }));
    return;
  }

  if (filter === 'structure') {
    const structRels = new Set(['HAS_CONCEPT','BELONGS_TO','PART_OF','HAS_CLUSTER']);
    const structNodes = new Set();
    visEdges.forEach(e => {
      const isStruct = structRels.has(e._data.rel);
      visEdges.update({ id: e.id, hidden: !isStruct });
      if (isStruct) { structNodes.add(e.from); structNodes.add(e.to); }
    });
    visNodes.forEach(n => visNodes.update({ id: n.id, hidden: !structNodes.has(n.id) }));
    return;
  }

  // Domain filter
  const domainNodes = new Set();
  GRAPH.nodes.forEach(n => {
    if (n.type === 'Domain' && n.id === filter) domainNodes.add(n.id);
    if (n.domains && n.domains.includes(filter)) domainNodes.add(n.id);
    // Also show theories that emphasize concepts in this domain
    if (n.type === 'Theory') {
      const theoryEdges = (adj[n.id] || []).filter(a => domainNodes.has(a.neighbor) || (nodeMap[a.neighbor] && nodeMap[a.neighbor].domains && nodeMap[a.neighbor].domains.includes(filter)));
      if (theoryEdges.length) domainNodes.add(n.id);
    }
  });
  // Second pass for theories
  GRAPH.nodes.forEach(n => {
    if (n.type === 'Theory') {
      const theoryNeighbors = (adj[n.id] || []).some(a => domainNodes.has(a.neighbor));
      if (theoryNeighbors) domainNodes.add(n.id);
    }
  });

  visNodes.forEach(n => visNodes.update({ id: n.id, hidden: !domainNodes.has(n.id) }));
  visEdges.forEach(e => {
    const show = domainNodes.has(e.from) && domainNodes.has(e.to);
    visEdges.update({ id: e.id, hidden: !show });
  });
}

// Double click → focus
network.on('doubleClick', function(params) {
  if (params.nodes.length) {
    network.focus(params.nodes[0], { scale: 1.5, animation: { duration: 400, easingFunction: 'easeInOutQuad' } });
  } else {
    network.fit({ animation: { duration: 400 } });
  }
});
</script>
